name: Build and Release PairIP Core SO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version increment type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c
      
      - name: Build for arm64-v8a
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target pairipcore -j $(nproc)
      
      - name: List built files
        run: |
          echo "Built files:"
          find build -name "*.so" -ls
      
      - name: Prepare release files
        run: |
          mkdir -p release_output
          find build -name "*.so" -exec cp {} release_output/ \;
          cd release_output
          ls -la
      
      - name: Upload SO artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpairipcore.so
          path: release_output/*.so

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download built SO
        uses: actions/download-artifact@v4
        with:
          name: libpairipcore.so
          path: release_assets
      
      - name: Get current version
        id: current_version
        run: |
          # 从已有的 tag 获取最新版本号
          latest_tag=$(git tag -l "v*" | sort -V | tail -n 1)
          if [ -z "$latest_tag" ]; then
            echo "version=1.0.0" >> $GITHUB_OUTPUT
          else
            echo "version=${latest_tag#v}" >> $GITHUB_OUTPUT
          fi
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT
      
      - name: Bump version
        id: bumped_version
        run: |
          current=${{ steps.current_version.outputs.version }}
          
          # 手动触发时使用选择的类型
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            type="${{ github.event.inputs.version_type }}"
          else
            type="patch"
          fi
          
          IFS='.' read -r major minor patch <<< "$current"
          
          case "$type" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac
          
          new_version="$major.$minor.$patch"
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "new_tag=v$new_version" >> $GITHUB_OUTPUT
      
      - name: Generate release notes
        id: release_notes
        run: |
          # 获取上一个 tag 之后的 commits
          prev_tag=${{ steps.current_version.outputs.latest_tag }}
          if [ -z "$prev_tag" ]; then
            commits_log=$(git log --oneline --pretty=format:"- %s" | head -20)
          else
            commits_log=$(git log --oneline "$prev_tag..HEAD" --pretty=format:"- %s")
          fi
          
          # 如果没有 commits，使用默认消息
          if [ -z "$commits_log" ]; then
            commits_log="- No new commits"
          fi
          
          # 生成 release notes
          cat << 'EOF' > release_notes.md
          ## PairIP Core Native Library Release
          
          ### 📦 Download
          - **libpairipcore.so** - ARM64 Android native library
          
          ### 🔧 Build Info
          - Architecture: arm64-v8a
          - Android API: 21 (Android 5.0+)
          - NDK Version: r27c
          - Build Type: Release
          
          ### 📝 Changes in this release
          
          EOF
          
          echo "$commits_log" >> release_notes.md
          
          cat >> release_notes.md << 'EOF'
          
          ### 🚀 Usage
          ```cmake
          target_link_libraries(your_app pairipcore)
          ```
          
          ### ⚠️ Requirements
          - Android NDK r27c or later
          - CMake 3.22.1+
          
          *Automated release via GitHub Actions*
          EOF
          
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bumped_version.outputs.new_tag }}
          name: "PairIP Core v${{ steps.bumped_version.outputs.new_version }}"
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          files: release_assets/*.so
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update version file (optional)
        run: |
          echo "${{ steps.bumped_version.outputs.new_version }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION 2>/dev/null || true
          git commit -m "chore: bump version to ${{ steps.bumped_version.outputs.new_version }}" || true
          git push origin HEAD:${{ github.ref_name }} || true
