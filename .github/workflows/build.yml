name: Build PairIP Core SO Library

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build for ${{ matrix.abi }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        abi:
          - armeabi-v7a
          - arm64-v8a
          - x86
          - x86_64
      fail-fast: false  # 一个失败不影响其他编译
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          local-cache: true
      
      - name: Configure CMake
        run: |
          cmake -B build/${{ matrix.abi }} \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      
      - name: Build with CMake
        run: cmake --build build/${{ matrix.abi }} --config Release --target pairipcore -j $(nproc)
      
      - name: List built files
        run: |
          echo "Built files for ${{ matrix.abi }}:"
          find build/${{ matrix.abi }} -name "*.so" -ls || echo "No SO files found"
      
      - name: Upload SO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pairipcore-${{ matrix.abi }}
          path: |
            build/${{ matrix.abi }}/*.so
            build/${{ matrix.abi }}/lib/*.so
            build/${{ matrix.abi }}/**/*.so
          if-no-files-found: warn
      
      - name: Upload debug symbols (可选)
        uses: actions/upload-artifact@v4
        with:
          name: pairipcore-debug-${{ matrix.abi }}
          path: |
            build/${{ matrix.abi }}/**/*.dSYM/
            build/${{ matrix.abi }}/**/*.debug
          if-no-files-found: ignore

  # 可选：打包所有 ABI 到一个压缩包
  package-all:
    name: Package all ABIs
    runs-on: ubuntu-latest
    needs: build
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create final package
        run: |
          mkdir -p pairipcore-release
          for dir in artifacts/pairipcore-*/; do
            abi=$(basename "$dir" | sed 's/pairipcore-//')
            mkdir -p "pairipcore-release/lib/$abi"
            find "$dir" -name "*.so" -exec cp {} "pairipcore-release/lib/$abi/" \;
          done
          tree pairipcore-release/ || ls -laR pairipcore-release/
          zip -r pairipcore-all-abi.zip pairipcore-release/
      
      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: pairipcore-all-abi
          path: pairipcore-all-abi.zip
